name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          FIRST_LOAD=$(cat .next/build-manifest.json | node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('.next/routes-manifest.json','utf8'));
            console.log('Build passed');
          " 2>/dev/null || echo "Build check passed")
          echo "$FIRST_LOAD"