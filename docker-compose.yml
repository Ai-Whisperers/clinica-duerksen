services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinica-duerksen
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - duerksen-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=agent-net"
      - "traefik.http.routers.duerksen.rule=Host(`duerksen.paragu-ai.com`) || Host(`clinicaduerksen.com.py`)"
      - "traefik.http.routers.duerksen.entrypoints=websecure"
      - "traefik.http.routers.duerksen.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.duerksen.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  duerksen-net:
    driver: bridge